<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — Academic Comeback Package</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<style>
  body { background: var(--ink); color: #fff; display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; font-family: 'Manrope', sans-serif; }
  .welcome-box { max-width: 560px; padding: 40px 24px; }
  .icon-wrap { width: 80px; height: 80px; background: rgba(201,151,58,.1); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 28px; box-shadow: var(--gold-glow); border: 1px solid rgba(201,151,58,.2); }
  h1 { font-family: 'Clash Display', sans-serif; font-size: 2.4rem; font-weight: 600; margin-bottom: 16px; letter-spacing: -0.5px; color: #fff; }
  p { color: rgba(255,255,255,.7); line-height: 1.75; margin-bottom: 32px; font-size: 1.02rem; }
  .wa-box { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius-lg); padding: 28px 24px; margin-bottom: 28px; text-align: center; }
  .wa-box h3 { font-family: 'Clash Display', sans-serif; font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; color: #fff; }
  .wa-box p { font-size: .92rem; margin-bottom: 20px; color: var(--gray-l); }
</style>
<script>
  if (window.location.hash.startsWith('#token=')) {
    const hashToken = window.location.hash.substring(7);
    sessionStorage.setItem('ac_token', hashToken);
    window.history.replaceState({}, document.title, window.location.pathname + window.location.search);
  }
  if(!sessionStorage.getItem('ac_token')) window.location.href = '/';
</script>
</head>
<body>

<div class="welcome-box">
  <div class="icon-wrap"><i class="bi bi-rocket-takeoff-fill"></i></div>
  <h1>You're in. Congratulations.</h1>
  <p>Your payment was successful and your account is set up. Before you access your library, there's one important step.</p>
  
  <div class="wa-box">
    <h3>Join the Private Community</h3>
    <p>Join 500+ students receiving weekly study systems and direct accountability.</p>
    <a href="https://chat.whatsapp.com/HLtfMHU31JXGCvVZUbLSoT" target="_blank" class="btn btn--green btn--full">
      <i class="bi bi-whatsapp"></i> Join WhatsApp Community
    </a>
  </div>
  
  <button onclick="window.location.href='/library'" class="btn btn--gold btn--full">
    Continue to Library <i class="bi bi-arrow-right"></i>
  </button>
</div>

</body>
</html>
