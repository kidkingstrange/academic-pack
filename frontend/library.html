<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library — Academic Comeback Package</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/main.css?v=4">
<style>
  body { background: var(--ink); color: #fff; padding-bottom: 80px; font-family: 'Manrope', sans-serif; }
  .lib-header { background: var(--ink2); color: #fff; padding: 48px 0; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: 48px; }
  .lib-header h1 { font-family: 'Clash Display', sans-serif; font-size: 2.2rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
  .lib-header p { color: var(--gray-l); font-size: .95rem; }
  .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
  .lib-card { background: var(--ink2); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius-lg); padding: 28px 24px; display: flex; flex-direction: column; transition: all var(--transition); }
  .lib-card:hover { transform: translateY(-4px); box-shadow: var(--gold-glow); border-color: var(--gold); }
  .lib-card__title { font-family: 'Clash Display', sans-serif; font-size: 1.15rem; font-weight: 600; color: #fff; margin-bottom: 10px; line-height: 1.3; }
  .lib-card__desc { font-size: .88rem; color: var(--gray-l); line-height: 1.6; margin-bottom: 24px; flex-grow: 1; }
  .download-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); color: #fff; padding: 14px; border-radius: var(--radius); font-weight: 700; font-size: .9rem; cursor: pointer; transition: all var(--transition); }
  .download-btn:hover { background: linear-gradient(135deg, var(--gold), var(--gold-l)); color: var(--ink); border-color: transparent; box-shadow: 0 4px 12px rgba(201,151,58,.25); }
  .download-btn:disabled { opacity: .7; cursor: default; }
  .download-btn--ready { background: linear-gradient(135deg, var(--gold), var(--gold-l)); color: var(--ink); border-color: transparent; animation: readyPulse 1.4s ease-in-out infinite; }
  @keyframes readyPulse { 0%,100% { box-shadow: 0 0 0 rgba(201,151,58,.4); } 50% { box-shadow: 0 0 0 6px rgba(201,151,58,0); } }
  .loader-page { position: fixed; inset: 0; background: var(--ink); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.1); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Post-purchase survey — small dismissible card, never a blocker.
     No backdrop, no dimming of the page, no interaction required before
     the customer can keep using their library. ── */
  .survey-card {
    position: fixed;
    bottom: 24px;
    right: 24px;
    max-width: 390px;
    width: calc(100% - 48px);
    background: linear-gradient(160deg, #0c0e14 0%, #131826 55%, #0f1520 100%);
    border: 1px solid rgba(201,151,58,.15);
    border-radius: var(--radius-xl);
    padding: 36px 28px 28px;
    box-shadow: 0 24px 60px rgba(0,0,0,.6), var(--gold-glow);
    z-index: 2000;
    overflow: hidden;
    transform: translateY(30px) scale(.96);
    opacity: 0;
    visibility: hidden;
    transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .35s ease, visibility .35s ease;
  }
  .survey-card.open {
    transform: translateY(0) scale(1);
    opacity: 1;
    visibility: visible;
  }
  .survey-card::before {
    content: '';
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 380px;
    background: radial-gradient(circle, rgba(201,151,58,.12) 0%, rgba(201,151,58,.03) 45%, transparent 70%);
    pointer-events: none;
  }
  /* Exact values from .modal__close (landing.css) — that stylesheet
     isn't loaded on this page, so the numbers are reproduced here
     rather than the class being shared, but they must match exactly. */
  .survey-card__close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .92rem;
    color: rgba(255,255,255,.7);
    transition: all var(--transition);
    z-index: 10;
  }
  .survey-card__close:hover {
    background: rgba(255,255,255,.15);
    color: #fff;
  }
  .survey-card__title {
    font-family: 'Clash Display', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    padding-right: 30px;
    letter-spacing: -.5px;
    position: relative;
    z-index: 1;
  }
  .survey-card__sub {
    font-size: .86rem;
    color: var(--gray-l);
    margin-bottom: 20px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }
  .survey-q {
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }
  .survey-q__label {
    display: block;
    font-size: .82rem;
    font-weight: 600;
    color: rgba(255,255,255,.9);
    margin-bottom: 8px;
  }
  .survey-q__optional {
    font-weight: 400;
    color: rgba(255,255,255,.35);
  }
  .survey-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .survey-chip {
    display: inline-flex;
    align-items: center;
    background: rgba(201,151,58,0.06);
    border: 1px solid rgba(201,151,58,0.18);
    color: var(--gray-l);
    font-size: .76rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: all .2s ease;
    font-family: inherit;
  }
  .survey-chip:hover {
    border-color: var(--gold);
    color: #fff;
    background: rgba(201,151,58,0.12);
  }
  .survey-chip--selected {
    background: linear-gradient(135deg, var(--gold), var(--gold-l));
    border-color: transparent;
    color: var(--ink);
    box-shadow: 0 4px 12px rgba(201,151,58,0.2);
  }
  .survey-textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px;
    font-size: .88rem;
    font-family: inherit;
    background: rgba(255,255,255,.04);
    color: #fff;
    resize: vertical;
    outline: none;
    transition: all var(--transition);
  }
  .survey-textarea:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,.08);
    box-shadow: 0 0 0 3px rgba(201,151,58,.15);
  }
  .survey-textarea::placeholder {
    color: rgba(255,255,255,.3);
  }
  .survey-card__actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 4px;
    position: relative;
    z-index: 1;
  }
  .survey-skip-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,.35);
    font-size: .84rem;
    cursor: pointer;
    padding: 8px 16px;
    transition: color .2s ease;
    font-family: inherit;
    font-weight: 500;
  }
  .survey-skip-btn:hover {
    color: rgba(255,255,255,.6);
  }
  /* Only sizing is overridden here — background, color, box-shadow, and
     hover all come from .btn--gold (main.css) unchanged, so the gradient
     + glow are pixel-identical to every other primary gold CTA on the
     site, not a re-invented approximation of it. */
  .survey-submit-btn {
    flex-shrink: 0;
    padding: 12px 24px;
    font-size: .88rem;
    font-weight: 800; /* matches .modal__submit's weight for this same primary-pill-CTA role */
  }
  .survey-submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  @media(max-width:480px) {
    .survey-card { left: 12px; right: 12px; bottom: 12px; width: auto; max-width: none; max-height: 80vh; overflow-y: auto; }
  }
</style>

<body>

<div class="loader-page" id="loader">
  <div class="spinner"></div>
  <p style="font-weight:600; color:var(--gray-l)">Loading your library...</p>
</div>

<header class="lib-header">
  <div class="container">
    <h1 id="user-name">Your Library</h1>
    <p>Download your resources below. Do not share these files.</p>
  </div>
</header>

<main class="container">
  <div class="lib-grid" id="products-grid">
    <!-- Injected via JS -->
  </div>
</main>

<!-- Post-purchase survey — optional, dismissible, never blocks access.
     Hidden by default; shown (at most once, ever) after the library has
     already loaded successfully. -->
<div class="survey-card" id="survey-card">
  <button class="survey-card__close" id="survey-close" aria-label="Close"><i class="bi bi-x-lg"></i></button>
  <h3 class="survey-card__title">Quick question</h3>
  <p class="survey-card__sub">Optional — takes 20 seconds, helps us improve.</p>

  <div class="survey-q">
    <label class="survey-q__label">Why did you get this package?</label>
    <div class="survey-chips" data-question="reason">
      <button type="button" class="survey-chip" data-value="Failing exams">Failing exams</button>
      <button type="button" class="survey-chip" data-value="Want better grades">Want better grades</button>
      <button type="button" class="survey-chip" data-value="Preparing for a big exam">Preparing for a big exam</button>
      <button type="button" class="survey-chip" data-value="Other">Other</button>
    </div>
  </div>

  <div class="survey-q">
    <label class="survey-q__label">Who is this for?</label>
    <div class="survey-chips" data-question="for_whom">
      <button type="button" class="survey-chip" data-value="Myself">Myself</button>
      <button type="button" class="survey-chip" data-value="My child">My child</button>
      <button type="button" class="survey-chip" data-value="A friend/sibling">A friend/sibling</button>
      <button type="button" class="survey-chip" data-value="Other">Other</button>
    </div>
  </div>

  <div class="survey-q">
    <label class="survey-q__label">How did you hear about us?</label>
    <div class="survey-chips" data-question="source">
      <button type="button" class="survey-chip" data-value="Facebook/Instagram">Facebook/Instagram</button>
      <button type="button" class="survey-chip" data-value="WhatsApp">WhatsApp</button>
      <button type="button" class="survey-chip" data-value="A friend">A friend</button>
      <button type="button" class="survey-chip" data-value="Other">Other</button>
    </div>
  </div>

  <div class="survey-q">
    <label class="survey-q__label">Anything else you'd like to share? <span class="survey-q__optional">(optional)</span></label>
    <textarea id="survey-comments" class="survey-textarea" placeholder="Optional..." rows="2"></textarea>
  </div>

  <div class="survey-card__actions">
    <button type="button" class="survey-skip-btn" id="survey-skip">No thanks, I'll pass</button>
    <button type="button" class="btn btn--gold survey-submit-btn" id="survey-submit">Submit →</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  // ── Device-local convenience fallback ────────────────────────────────
  // NOT an exchange or session mechanism — the durable library token
  // itself remains the single source of truth. This just stops the
  // browser from "forgetting" a customer who navigates to a bare
  // /library (bookmark, typed URL, browser history) after already
  // proving access once on this device via their real emailed link.
  // If neither a URL token nor a remembered one exists, this silently
  // falls through to the normal "Access Link Required" message below.
  const STORAGE_KEY = 'ac_library_token';
  let redirectingWithStoredToken = false;
  if (!token) {
    let stored = null;
    try { stored = localStorage.getItem(STORAGE_KEY); } catch (err) { /* localStorage unavailable */ }
    if (stored) {
      redirectingWithStoredToken = true;
      window.location.replace('/library?token=' + encodeURIComponent(stored));
    }
  }

  function showAccessError() {
    document.getElementById('loader').style.display = 'none';
    const header = document.querySelector('.lib-header');
    if (header) header.style.display = 'none';
    const main = document.querySelector('main.container');
    if (main) {
      main.innerHTML = `
        <div style="max-width: 500px; margin: 80px auto; padding: 40px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);">
          <div style="font-size: 3rem; color: #ffbc00; margin-bottom: 20px;"><i class="bi bi-shield-lock"></i></div>
          <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 16px;">Access Link Required</h2>
          <p style="color: var(--gray-l); font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px;">Please use the direct library access link sent to your email after purchase. If you just purchased, wait a few seconds and check your inbox (and spam folder) for your welcome email.</p>
          <a href="/" class="btn btn--gold" style="display: inline-block; text-decoration: none; width: 100%; text-align: center;">Go to Homepage</a>
        </div>
      `;
    }
  }

  async function loadLibrary() {
    if (!token) {
      showAccessError();
      return;
    }
    try {
      const res = await fetch(`/api/library?token=${encodeURIComponent(token)}`);
      if (!res.ok) throw new Error('Unauthorized');

      // Only remembered on a genuinely successful load — never cache a
      // token that turned out to be invalid.
      try { localStorage.setItem(STORAGE_KEY, token); } catch (err) { /* ignore */ }

      const data = await res.json();
      document.getElementById('user-name').textContent = `Welcome, ${data.user_name.split(' ')[0]}`;
      
      const grid = document.getElementById('products-grid');
      grid.innerHTML = data.products.map(p => `
        <div class="lib-card">
          <h3 class="lib-card__title">${p.title}</h3>
          <p class="lib-card__desc">${p.description}</p>
          <button class="download-btn" data-product-id="${p.id}" data-state="idle">
            <i class="bi bi-download"></i> Download PDF
          </button>
        </div>
      `).join('');

      document.getElementById('loader').style.display = 'none';
      maybeShowSurvey();
    } catch (err) {
      showAccessError();
    }
  }

  // ── Post-purchase survey ──────────────────────────────────────────────
  // Purely optional, never blocks anything — called only after the
  // library has already loaded successfully. Shown at most once per
  // customer (tracked client-side; skipping never shows it again either).
  const SURVEY_SHOWN_KEY = 'ac_survey_shown';
  const surveyAnswers = {};

  function maybeShowSurvey() {
    const card = document.getElementById('survey-card');
    if (!card) return;
    try {
      if (localStorage.getItem(SURVEY_SHOWN_KEY)) return;
    } catch (err) {
      return; // localStorage unavailable — safest to just not show it
    }
    setTimeout(() => { card.classList.add('open'); }, 1500);
  }

  function hideSurvey() {
    const card = document.getElementById('survey-card');
    if (card) card.classList.remove('open');
    try { localStorage.setItem(SURVEY_SHOWN_KEY, '1'); } catch (err) { /* ignore */ }
  }

  document.querySelectorAll('.survey-chips').forEach((group) => {
    const question = group.dataset.question;
    group.querySelectorAll('.survey-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        group.querySelectorAll('.survey-chip').forEach((c) => c.classList.remove('survey-chip--selected'));
        chip.classList.add('survey-chip--selected');
        surveyAnswers[question] = chip.dataset.value;
      });
    });
  });

  document.getElementById('survey-close').addEventListener('click', hideSurvey);
  document.getElementById('survey-skip').addEventListener('click', hideSurvey);

  document.getElementById('survey-submit').addEventListener('click', async () => {
    const submitBtn = document.getElementById('survey-submit');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    const comments = document.getElementById('survey-comments').value.trim();
    const answers = Object.assign({}, surveyAnswers);
    if (comments) answers.other_comments = comments;

    try {
      await fetch('/api/survey/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, answers }),
      });
    } catch (err) {
      // Best-effort — a failed submission should never trap the customer
      // in the card or show it again; that would be worse than losing
      // one response.
    }
    hideSurvey();
  });

  // Two-step, click-gated download.
  //
  // In-app browsers (Facebook/Instagram) silently prefetch/pre-scan links
  // before the user taps them. The first version of this fix stopped
  // rendering the signed URL as an <a href> or an automatic window.open()
  // target — but real-world evidence (confirmed via a session's User-Agent
  // showing FB_IAB/FBAV — Facebook's in-app browser — plus its signed
  // token being consumed 4-5 seconds after signing, far too fast for a
  // genuine second human tap) showed that wasn't enough: the URL was still
  // stored in a `data-signed-url` DOM attribute, and Facebook's in-app
  // browser evidently scans page text/attributes for URL-shaped strings
  // and prefetches them regardless of whether they're an actual link.
  //
  // Fix: the signed URL now never touches the DOM at all — it lives only
  // in this in-memory Map, invisible to anything that scans page content.
  // Step 1 (a real click) signs a token and swaps the button to "ready".
  // Step 2 — a separate, genuine click on the same button — looks the URL
  // up from memory and navigates. Nothing on the page ever contains the
  // URL as text for a scanner to find.
  const pendingDownloadUrls = new Map(); // productId -> signed_url, JS memory only

  document.getElementById('products-grid').addEventListener('click', async (e) => {
    const btn = e.target.closest('.download-btn');
    if (!btn || btn.disabled) return;
    const productId = btn.dataset.productId;

    if (btn.dataset.state === 'idle') {
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Preparing...';
      try {
        const res = await fetch(`/api/library/sign/${productId}?token=${encodeURIComponent(token)}`);
        if (!res.ok) throw new Error('Failed to generate download link');
        const data = await res.json();

        pendingDownloadUrls.set(productId, data.signed_url);
        btn.dataset.state = 'ready';
        btn.disabled = false;
        btn.classList.add('download-btn--ready');
        btn.innerHTML = '<i class="bi bi-download"></i> Tap to Download';
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = original;
        alert(err.message);
      }
      return;
    }

    if (btn.dataset.state === 'ready') {
      const signedUrl = pendingDownloadUrls.get(productId);
      pendingDownloadUrls.delete(productId);
      if (!signedUrl) {
        // Shouldn't happen, but fail safe back to idle rather than navigate nowhere.
        btn.dataset.state = 'idle';
        btn.innerHTML = '<i class="bi bi-download"></i> Download PDF';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Downloading...';
      window.location.href = signedUrl;
      // Restore to a fresh idle state in case the browser stays on this
      // page after the download starts (most mobile browsers do).
      setTimeout(() => {
        btn.disabled = false;
        btn.dataset.state = 'idle';
        btn.classList.remove('download-btn--ready');
        btn.innerHTML = '<i class="bi bi-download"></i> Download PDF';
      }, 4000);
    }
  });

  // If a redirect with the remembered token just fired above, don't also
  // run loadLibrary() with token=null in this same tick — that would
  // briefly flash "Access Link Required" right before navigation completes.
  if (!redirectingWithStoredToken) {
    loadLibrary();
  }
</script>
</body>
</html>
