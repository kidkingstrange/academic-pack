<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library — Academic Comeback Package</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<style>
  body { background: var(--surface); padding-bottom: 80px; }
  .lib-header { background: var(--ink); color: #fff; padding: 40px 0; margin-bottom: 40px; }
  .lib-header h1 { font-family: 'Fraunces', serif; font-size: 2rem; margin-bottom: 8px; }
  .lib-header p { color: rgba(255,255,255,.7); }
  .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
  .lib-card { background: #fff; border: 1px solid #e8e6e0; border-radius: var(--radius-lg); padding: 24px; display: flex; flex-direction: column; transition: transform var(--transition); }
  .lib-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--gold); }
  .lib-card__title { font-size: 1.1rem; font-weight: 800; color: var(--ink); margin-bottom: 8px; line-height: 1.3; }
  .lib-card__desc { font-size: .88rem; color: var(--text2); line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }
  .download-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--surface2); color: var(--ink); border: none; padding: 12px; border-radius: var(--radius); font-weight: 600; font-size: .9rem; cursor: pointer; transition: background var(--transition); }
  .download-btn:hover { background: var(--gold); color: #fff; }
  .loader-page { position: fixed; inset: 0; background: var(--surface); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
  .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loader-page" id="loader">
  <div class="spinner"></div>
  <p style="font-weight:600; color:var(--text2)">Loading your library...</p>
</div>

<header class="lib-header">
  <div class="container">
    <h1 id="user-name">Your Library</h1>
    <p>Download your resources below. Do not share these files.</p>
  </div>
</header>

<main class="container">
  <div class="lib-grid" id="products-grid">
    <!-- Injected via JS -->
  </div>
</main>

<script>
  if (window.location.hash.startsWith('#token=')) {
    const hashToken = window.location.hash.substring(7);
    sessionStorage.setItem('ac_token', hashToken);
    window.history.replaceState({}, document.title, window.location.pathname + window.location.search);
  }
  const token = sessionStorage.getItem('ac_token');

  async function loadLibrary() {
    try {
      const headers = {};
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      
      const res = await fetch('/api/library', { headers });
      if (!res.ok) throw new Error('Unauthorized');
      
      const data = await res.json();
      document.getElementById('user-name').textContent = `Welcome, ${data.user_name.split(' ')[0]}`;
      
      const grid = document.getElementById('products-grid');
      grid.innerHTML = data.products.map(p => `
        <div class="lib-card">
          <h3 class="lib-card__title">${p.title}</h3>
          <p class="lib-card__desc">${p.description}</p>
          <button class="download-btn" onclick="downloadProduct('${p.id}')">
            <i class="bi bi-download"></i> Download PDF
          </button>
        </div>
      `).join('');
      
      document.getElementById('loader').style.display = 'none';
    } catch (err) {
      sessionStorage.removeItem('ac_token');
      window.location.href = '/';
    }
  }

  async function downloadProduct(id) {
    try {
      const headers = {};
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      // 1. Get signed URL
      const res = await fetch(`/api/library/sign/${id}`, { headers });
      if (!res.ok) throw new Error('Failed to generate download link');
      const data = await res.json();
      
      // 2. Open signed URL in new tab to trigger download
      window.open(data.signed_url, '_blank');
      
    } catch (err) {
      alert(err.message);
    }
  }

  loadLibrary();
</script>
</body>
</html>
