<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Self-Registration — Academic Comeback</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/landing.css">
<style>
  body { background: linear-gradient(160deg,var(--ink) 0%,#0f1320 60%,#131826 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .login-card { background: linear-gradient(160deg,#0c0e14 0%,#131826 55%,#0f1520 100%); border: 1px solid rgba(201,151,58,.15); border-radius: var(--radius-xl); max-width: 420px; width: 100%; padding: 44px 36px; box-shadow: 0 24px 60px rgba(0,0,0,.6), var(--gold-glow); position: relative; overflow: hidden; }
  .login-card::before { content: ''; position: absolute; top: -120px; left: 50%; transform: translateX(-50%); width: 380px; height: 380px; background: radial-gradient(circle, rgba(201,151,58,.14) 0%, rgba(201,151,58,.04) 45%, transparent 70%); pointer-events: none; }
  .login-card > * { position: relative; z-index: 1; }
  .icon-wrap { width: 64px; height: 64px; background: rgba(201,151,58,.1); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 20px; box-shadow: var(--gold-glow); border: 1px solid rgba(201,151,58,.2); }
  h1.login-title { font-family: 'Clash Display', sans-serif; font-size: 1.8rem; font-weight: 600; color: #fff; text-align: center; margin-bottom: 8px; letter-spacing: -.5px; }
  .login-sub { font-size: .95rem; color: var(--gray-l); text-align: center; line-height: 1.7; margin-bottom: 28px; }
  .login-err { color: var(--red); font-size: .82rem; margin-top: 6px; text-align: center; display: none; }
  .login-success { color: var(--green); font-size: .82rem; margin-top: 6px; text-align: center; display: none; }
</style>
</head>
<body>

<div class="login-card">
  <div class="icon-wrap"><i class="bi bi-person-plus-fill"></i></div>
  <h1 class="login-title">Join the Sales Team</h1>
  <p class="login-sub">Create your account to start generating client checkout links and tracking leads.</p>

  <form id="register-form" autocomplete="off">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="e.g. Victor Smith" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="e.g. victor@scalegroup.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" minlength="6" required>
    </div>

    <button type="submit" class="modal__submit" id="submit-btn">Register Account →</button>
    <p class="login-err" id="error-msg"></p>
    <p class="login-success" id="success-msg">Registration received — an admin will review and activate your account before you can log in.</p>
  </form>
</div>

<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    const success = document.getElementById('success-msg');

    btn.disabled = true;
    btn.textContent = 'Registering...';
    err.style.display = 'none';
    success.style.display = 'none';

    try {
      const res = await fetch('/api/sales/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Registration failed');

      success.style.display = 'block';
      setTimeout(() => {
        window.location.href = '/sales';
      }, 1500);
    } catch (error) {
      err.textContent = error.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Register Account →';
    }
  });
</script>
</body>
</html>
