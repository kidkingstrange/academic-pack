<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard — Academic Comeback</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap">
<link rel="stylesheet" href="/css/main.css">
<style>
  :root {
    --bg-sidebar: var(--ink);
    --bg-card: var(--ink2);
    --bg-card-hover: var(--ink3);
    --border-color: rgba(255, 255, 255, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    color: #fff;
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border-color);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold-l));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    font-weight: 800;
    font-size: 1.2rem;
    box-shadow: var(--gold-glow);
  }
  .brand-text {
    font-family: 'Clash Display', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .brand-badge {
    font-size: 0.65rem;
    background: rgba(201,151,58,.15);
    color: var(--gold-l);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .user-info {
    text-align: right;
  }
  .user-name {
    font-weight: 700;
    font-size: 0.9rem;
  }
  .user-role {
    font-size: 0.75rem;
    color: var(--gray-l);
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--gray-l);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-logout:hover {
    color: #fff;
    border-color: var(--red);
    background: rgba(239, 68, 68, 0.08);
  }

  .main-container {
    padding: 40px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 32px;
    flex-grow: 1;
  }

  @media (max-width: 1024px) {
    .main-container {
      grid-template-columns: 1fr;
    }
  }

  /* ── Card/Form ── */
  .panel-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 28px;
    height: fit-content;
  }

  .panel-title {
    font-family: 'Clash Display', sans-serif;
    font-weight: 600;
    font-size: 1.2rem;
    color: #fff;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 12px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--gray-l);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .input-control {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border-color);
    color: #fff;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    transition: var(--transition);
  }
  .input-control:focus {
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(201, 151, 58, 0.15);
  }

  .btn-action {
    background: linear-gradient(135deg, var(--gold), var(--gold-l));
    color: var(--ink);
    font-weight: 700;
    font-size: 0.88rem;
    padding: 12px 24px;
    border-radius: var(--radius-full);
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    transition: var(--transition);
    text-decoration: none;
    box-shadow: 0 4px 24px rgba(201,151,58,.3);
  }
  .btn-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 36px rgba(201,151,58,.4);
  }
  .btn-action:disabled {
    opacity: 0.6;
    transform: none;
    cursor: not-allowed;
  }

  /* ── Result link area ── */
  .result-box {
    margin-top: 24px;
    background: rgba(201, 151, 58, 0.05);
    border: 1px dashed rgba(201, 151, 58, 0.3);
    border-radius: 10px;
    padding: 16px;
    display: none;
  }
  .result-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gold-l);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-link-row {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--ink);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 8px 12px;
    overflow: hidden;
  }
  .result-url {
    font-family: monospace;
    font-size: 0.8rem;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-grow: 1;
  }
  .btn-copy {
    background: transparent;
    border: none;
    color: var(--gold-l);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: var(--transition);
  }
  .btn-copy:hover {
    color: #fff;
    transform: scale(1.1);
  }

  /* ── Table Log ── */
  .data-table-container {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    overflow: hidden;
    height: fit-content;
  }
  .table-header-row {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .table-title {
    font-family: 'Clash Display', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    color: #fff;
  }

  table.data-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
  }
  table.data-table th, table.data-table td {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.86rem;
  }
  table.data-table th {
    color: var(--gray-l);
    font-weight: 700;
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  table.data-table tr:hover td {
    background: var(--bg-card-hover);
  }

  .status-pill {
    padding: 4px 10px;
    border-radius: var(--radius-full);
    font-size: 0.72rem;
    font-weight: 700;
    display: inline-block;
  }
  .status-pill.success { background: rgba(34, 197, 94, 0.15); color: var(--green); }
  .status-pill.pending { background: rgba(201,151,58,.15); color: var(--gold-l); }
  .status-pill.failed { background: rgba(239, 68, 68, 0.15); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">S</div>
    <div class="brand-text">Scale Group <span class="brand-badge">Sales Rep</span></div>
  </div>

  <div class="user-profile">
    <div class="user-info">
      <div class="user-name" id="rep-name">Loading rep...</div>
      <div class="user-role" id="rep-email">rep@scalegroup.com</div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
  </div>
</header>

<div class="main-container">
  
  <!-- Left Side: Lead/Link Generator -->
  <div class="panel-card">
    <h2 class="panel-title"><i class="bi bi-link-45deg"></i> Generate Offer Link</h2>
    
    <form id="link-form">
      <div class="form-group">
        <label for="prospect-name">Prospect Name</label>
        <input type="text" id="prospect-name" class="input-control" placeholder="e.g. John Doe" required>
      </div>

      <div class="form-group">
        <label for="prospect-email">Prospect Email</label>
        <input type="email" id="prospect-email" class="input-control" placeholder="e.g. john@example.com" required>
      </div>

      <div class="form-group">
        <label for="prospect-phone">Prospect Phone Number</label>
        <input type="text" id="prospect-phone" class="input-control" placeholder="e.g. +234 803 123 4567" required>
      </div>

      <div class="form-group">
        <label for="offer-select">Select Offer Plan</label>
        <select id="offer-select" class="input-control" required style="cursor:pointer">
          <option value="" disabled selected>Select an offer...</option>
        </select>
      </div>

      <button type="submit" class="btn-action" id="submit-btn"><i class="bi bi-magic"></i> Generate Link</button>
    </form>

    <!-- Success Output -->
    <div class="result-box" id="result-box">
      <div class="result-title">Generated Checkout URL</div>
      <div class="result-link-row">
        <div class="result-url" id="result-url"></div>
        <button class="btn-copy" id="btn-copy" onclick="copyLink()" title="Copy link"><i class="bi bi-copy"></i></button>
      </div>
    </div>
  </div>

  <!-- Right Side: Leads History -->
  <div class="data-table-container">
    <div class="table-header-row">
      <h2 class="table-title">Your Generated Leads Log</h2>
    </div>

    <table class="data-table" id="leads-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Prospect</th>
          <th>Offer Selected</th>
          <th>Checkout URL</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" style="text-align:center;color:var(--gray-l)">Loading leads history...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const token = sessionStorage.getItem('sales_token');
  if (!token) {
    window.location.href = '/sales';
  }

  // Set Authorization Header Helper
  function getHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };
  }

  // Load Initial Rep, Offers and Leads
  async function init() {
    try {
      // 1. Fetch Rep Profile
      const meRes = await fetch('/api/sales/me', { headers: getHeaders() });
      if (!meRes.ok) throw new Error('Auth session expired');
      const meData = await meRes.json();
      document.getElementById('rep-name').textContent = meData.name;
      document.getElementById('rep-email').textContent = meData.email;

      // 2. Fetch Offers
      const offersRes = await fetch('/api/sales/offers', { headers: getHeaders() });
      if (offersRes.ok) {
        const offersData = await offersRes.json();
        const select = document.getElementById('offer-select');
        offersData.offers.forEach(o => {
          const typeLabel = o.billing_type === 'recurring_monthly' ? 'Monthly Sub' : 'One-time';
          const option = document.createElement('option');
          option.value = o.id;
          option.textContent = `${o.name} (₦${o.price.toLocaleString()} — ${typeLabel})`;
          select.appendChild(option);
        });
      }

      // 3. Fetch Leads log
      await loadLeads();
    } catch (err) {
      console.error(err);
      sessionStorage.removeItem('sales_token');
      window.location.href = '/sales';
    }
  }

  async function loadLeads() {
    const leadsRes = await fetch('/api/sales/leads', { headers: getHeaders() });
    const tbody = document.querySelector('#leads-table tbody');
    if (leadsRes.ok) {
      const leads = await leadsRes.json();
      if (leads.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--gray-l)">No leads generated yet</td></tr>`;
        return;
      }
      tbody.innerHTML = leads.map(l => {
        let statusClass = 'pending';
        let statusLabel = 'Generated';
        if (l.status === 'paid') {
          statusClass = 'success';
          statusLabel = 'Paid';
        } else if (l.status === 'abandoned') {
          statusClass = 'failed';
          statusLabel = 'Abandoned';
        }

        const formattedDate = new Date(l.created_at).toLocaleDateString();
        return `
          <tr>
            <td>${formattedDate}</td>
            <td style="font-weight:600">
              ${l.prospect_name}
              <div style="font-size:0.75rem;color:var(--gray-l);font-weight:400">${l.prospect_email}</div>
              <div style="font-size:0.72rem;color:var(--gold-l);font-weight:400">${l.prospect_phone}</div>
            </td>
            <td style="font-weight:600">
              ${l.offer_name}
              <div style="font-size:0.75rem;color:var(--gray-l);font-weight:400">₦${l.offer_price.toLocaleString()}</div>
            </td>
            <td>
              <div style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;font-size:0.8rem">
                <a href="${l.checkout_url}" target="_blank" style="color:var(--gold-l);text-decoration:none">${l.checkout_url}</a>
              </div>
            </td>
            <td><span class="status-pill ${statusClass}">${statusLabel}</span></td>
          </tr>
        `;
      }).join('');
    } else {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--red)">Failed to load leads history</td></tr>`;
    }
  }

  // Handle Form Submission for generating links
  document.getElementById('link-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const resultBox = document.getElementById('result-box');
    const resultUrl = document.getElementById('result-url');

    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Generating...';
    resultBox.style.display = 'none';

    try {
      const res = await fetch('/api/sales/leads', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({
          offer_id: document.getElementById('offer-select').value,
          prospect_name: document.getElementById('prospect-name').value,
          prospect_email: document.getElementById('prospect-email').value,
          prospect_phone: document.getElementById('prospect-phone').value
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to generate link');

      resultUrl.textContent = data.checkout_url;
      resultBox.style.display = 'block';

      // Reset form input values
      document.getElementById('prospect-name').value = '';
      document.getElementById('prospect-email').value = '';
      document.getElementById('prospect-phone').value = '';
      document.getElementById('offer-select').value = '';

      // Reload lead log
      await loadLeads();
    } catch (err) {
      alert(err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-magic"></i> Generate Link';
    }
  });

  // Copy Link utility
  function copyLink() {
    const url = document.getElementById('result-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const copyBtn = document.getElementById('btn-copy');
      copyBtn.innerHTML = '<i class="bi bi-check-lg" style="color:var(--green)"></i>';
      setTimeout(() => {
        copyBtn.innerHTML = '<i class="bi bi-copy"></i>';
      }, 1500);
    });
  }

  function logout() {
    sessionStorage.removeItem('sales_token');
    window.location.href = '/sales';
  }

  // Initialize page on load
  init();
</script>
</body>
</html>
