<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check — Academic Comeback</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  body {
    background-color: var(--ink);
    color: #fff;
    font-family: 'Manrope', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
  }

  .card {
    background-color: var(--ink2);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    padding: 48px 36px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .icon-container {
    width: 72px;
    height: 72px;
    background: rgba(201, 151, 58, 0.1);
    border: 1px solid rgba(201, 151, 58, 0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2.2rem;
    color: var(--gold);
    box-shadow: var(--gold-glow);
  }

  h1 {
    font-family: 'Clash Display', sans-serif;
    font-size: 1.8rem;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: -0.5px;
    color: #fff;
  }

  p {
    font-size: .95rem;
    color: var(--gray-l);
    line-height: 1.65;
    margin: 0 0 32px;
  }

  .btn-inbox {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold-l));
    color: var(--ink);
    font-weight: 800;
    font-size: 1rem;
    text-decoration: none;
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201, 151, 58, 0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-sizing: border-box;
  }

  .btn-inbox:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201, 151, 58, 0.4);
  }

  .footer-note {
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 24px;
  }
</style>

<body>

<div class="card">
  <div class="icon-container">
    <i class="bi bi-shield-check"></i>
  </div>
  <h1>Security Check</h1>
  <p>We've detected that this magic access link is being opened from a new device or browser. For your security, a fresh login link has been sent to your purchase email.</p>
  
  <a href="https://mail.google.com" target="_blank" class="btn-inbox">
    <i class="bi bi-envelope-at-fill"></i> Open Your Inbox
  </a>
  
  <div class="footer-note">
    You can close this window now.
  </div>
