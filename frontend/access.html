<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Your Library — Academic Comeback Package</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/main.css?v=4">
<style>
  body { background: var(--ink); color: #fff; display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; font-family: 'Manrope', sans-serif; padding: 24px; box-sizing: border-box; }
  .access-box { max-width: 420px; }
  .icon-wrap { width: 64px; height: 64px; background: rgba(201,151,58,.1); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 24px; border: 1px solid rgba(201,151,58,.2); }
  h1 { font-family: 'Clash Display', sans-serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 12px; }
  p { color: rgba(255,255,255,.7); line-height: 1.7; margin-bottom: 28px; }
</style>
</head>
<body>

<div class="access-box">
  <div class="icon-wrap"><i class="bi bi-unlock-fill"></i></div>
  <h1>Your Library Is Ready</h1>
  <p>Tap below to unlock your books and continue.</p>
  <button id="access-btn" class="btn btn--gold btn--full">
    Tap to Access Your Library <i class="bi bi-arrow-right"></i>
  </button>
</div>

<script>
  // Click-gated magic-link entry point.
  //
  // The welcome email's link used to point straight at
  // /api/auth/magic?token=... — a plain <a href>. In-app browsers
  // (Facebook/Instagram) prefetch/pre-scan links like that before the
  // customer ever taps them, which can trigger this app's own
  // new-device/session-binding check a second time and send a confused
  // customer into a re-verification loop.
  //
  // This page is the safe thing to prefetch instead: loading it has zero
  // server-side effect (main.py just returns this static file — the token
  // is never read or acted on server-side until the real exchange below
  // fires). The actual token is kept out of the DOM/URL bar and out of
  // any href — read once into a plain JS variable, used only inside a
  // real click handler.
  const params = new URLSearchParams(window.location.search);
  const magicToken = params.get('token') || '';
  const redirectTo = params.get('redirect') || '/library';

  document.getElementById('access-btn').addEventListener('click', () => {
    if (!magicToken) return;
    window.location.href = `/api/auth/magic?token=${encodeURIComponent(magicToken)}&redirect=${encodeURIComponent(redirectTo)}`;
  });
</script>

</body>
</html>
