version: '3.8'

services:
  backend:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: academic_backend
    restart: always
    env_file: 
      - ../.env
    volumes:
      - ../uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    image: nginx:alpine
    container_name: academic_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    container_name: academic_db
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
